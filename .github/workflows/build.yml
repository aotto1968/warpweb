name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: warpweb/package-lock.json

      - name: Install dependencies
        run: cd warpweb && npm install

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: cd warpweb && npm run build:linux

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: cd warpweb && npm run build:mac

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: cd warpweb && npm run build:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: warpweb/dist/
          retention-days: 7