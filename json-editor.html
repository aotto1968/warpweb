<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>JSON Editor - WarpWeb</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f5f5; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        .editor-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: #e0e0e0;
            border-bottom: 2px solid #ccc;
            flex-shrink: 0;
            gap: 6px;
            min-height: 32px;
        }
        .editor-title {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            flex: 0 0 70px;
        }
        .editor-filename {
            flex: 1;
            padding: 2px 6px;
            border: 1px solid #bbb;
            border-radius: 3px;
            font-size: 12px;
            font-family: monospace;
            background: #fff;
            color: #666;
        }
        .editor-btn {
            padding: 2px 8px;
            background: #ddd;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .editor-btn:hover { background: #ccc; }
        .editor-btn svg {
            width: 14px;
            height: 14px;
            fill: #666;
        }
        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #editor { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
        }
        .editor-status {
            background: #e0e0e0;
            color: #666;
            padding: 4px 8px;
            font-size: 12px;
            flex-shrink: 0;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="editor-header">
        <span class="editor-title">JSON</span>
        <input type="text" class="editor-filename" id="filename" readonly value="warpweb-data.json">
        <button class="editor-btn" onclick="format()" title="Format JSON">
            <svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/></svg>
            Format
        </button>
        <button class="editor-btn" onclick="save()" title="Save and Reload">
            <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            Save
        </button>
        <button class="editor-btn" onclick="closeEditor()" title="Close">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>
    <div class="editor-container">
        <div id="editor"></div>
    </div>
    <div class="editor-status" id="status">Loading JSON...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ace.min.js"></script>
    <script>
        let editor;
        let jsonPath = '';

        async function init() {
            editor = ace.edit("editor");
            editor.setTheme("ace/theme/chrome");
            editor.session.setMode("ace/mode/json");
            editor.setFontSize(14);
            editor.renderer.setShowGutter(true);

            try {
                jsonPath = await window.warpweb.getJsonPath();
                const json = await window.warpweb.getJson();
                editor.setValue(json);
                editor.clearSelection();
                document.getElementById('filename').value = jsonPath;
                document.getElementById('status').textContent = `Editing: ${jsonPath}`;
            } catch (e) {
                editor.setValue('{\n  "error": "Could not load JSON"\n}');
                document.getElementById('status').textContent = 'Error loading JSON';
            }
        }

        let saveTimeout = null;

        async function save() {
            let content = editor.getValue();
            if (!content.endsWith('\n')) content += '\n';
            try {
                const result = await window.warpweb.saveJson({ content });
                if (result.success) {
                    document.getElementById('status').textContent = `Saved: ${jsonPath}`;
                    if (saveTimeout) clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        closeEditor();
                    }, 1000);
                } else {
                    alert('Save failed: ' + (result.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error saving: ' + e.message);
            }
        }

        function closeEditor() {
            if (saveTimeout) {
                clearTimeout(saveTimeout);
                saveTimeout = null;
            }
            window.warpweb.closeJsonEditor();
        }

        function format() {
            try {
                const json = JSON.parse(editor.getValue());
                editor.setValue(formatEntriesItemsOneline(json) + '\n');
                editor.clearSelection();
                document.getElementById('status').textContent = 'JSON formatted (items on single line)';
            } catch (e) {
                alert('Invalid JSON: ' + e.message);
            }
        }

        function fmt(val) {
            if (val === null) return 'null';
            if (val === true) return 'true';
            if (val === false) return 'false';
            if (typeof val === 'number') return val;
            return JSON.stringify(val);
        }

        function formatEntriesItemsOneline(obj, depth = 0) {
            if (depth > 20) return JSON.stringify(obj);
            const sp = (n) => '  '.repeat(n);

            if (Array.isArray(obj)) {
                if (obj.length === 0) return '[]';
                if (depth >= 2) {
                    return '[' + obj.map(item => formatEntriesItemsOneline(item, depth + 1)).join(', ') + ']';
                }
                const items = obj.map(item => sp(depth + 1) + formatEntriesItemsOneline(item, depth + 1));
                return '[\n' + items.join(',\n') + '\n' + sp(depth) + ']';
            }

            if (obj !== null && typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '{}';
                const pairs = keys.map(k => {
                    const val = obj[k];
                    let valStr;
                    if (k === 'items' && Array.isArray(val)) {
                        const inner = val.map(item => {
                            if (item !== null && typeof item === 'object' && !Array.isArray(item)) {
                                const ekeys = Object.keys(item);
                                return '{ ' + ekeys.map(ek => '"' + ek + '": ' + fmt(item[ek])).join(', ') + ' }';
                            }
                            return JSON.stringify(item);
                        });
                        valStr = '[\n' + inner.map(i => sp(depth + 2) + i).join(',\n') + '\n' + sp(depth + 1) + ']';
                    } else {
                        valStr = formatEntriesItemsOneline(val, depth + 1);
                    }
                    return sp(depth) + '  "' + k + '": ' + valStr;
                });
                return '{\n' + pairs.join(',\n') + '\n' + sp(depth) + '}';
            }

            return JSON.stringify(obj);
        }

        window.onload = init;
    </script>
</body>
</html>
